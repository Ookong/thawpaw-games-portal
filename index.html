<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thawpaw Games</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2a2a40;--accent:#6c63ff;--silver:#9ca3af;--text:#f0f0f5;--dim:#555}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
canvas#stars{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* ── Nav ── */
nav{position:sticky;top:0;z-index:10;background:rgba(15,15,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.75rem 2rem;display:flex;align-items:center;gap:1rem}
nav .logo{font-size:1.25rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#6c63ff,#48c6ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
nav .logo span{-webkit-text-fill-color:#f0f0f5;font-weight:400;opacity:.5;margin-left:.25rem}
nav .nav-links{margin-left:auto;display:flex;gap:1.25rem;font-size:.85rem;color:var(--silver)}

/* ── Hero ── */
.hero{position:relative;z-index:1;text-align:center;padding:3.5rem 1.5rem 2rem}
.hero h1{font-size:2.6rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#6c63ff 0%,#48c6ef 50%,#f857a6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.hero p{color:var(--silver);font-size:1.1rem;max-width:500px;margin:0 auto}

/* ── Grid ── */
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 2rem 3rem}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem;color:var(--silver);text-transform:uppercase;letter-spacing:.08em;font-size:.8rem}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem}

/* ── Card ── */
.game-card{display:block;text-decoration:none;color:var(--text);background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s,border-color .22s;cursor:pointer}
.game-card:hover{transform:translateY(-6px) scale(1.015);box-shadow:0 16px 48px rgba(108,99,255,.18);border-color:rgba(108,99,255,.4)}
.game-card:active{transform:translateY(-2px) scale(1.005)}
.thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center}
.thumb-bg{position:absolute;inset:0;z-index:0}
.thumb svg{position:relative;z-index:1;width:45%;height:45%;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.thumb .play-btn{position:absolute;bottom:.75rem;right:.75rem;z-index:2;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:#fff;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1rem;opacity:0;transform:scale(.8);transition:opacity .2s,transform .2s;cursor:pointer}
.game-card:hover .play-btn{opacity:1;transform:scale(1)}
.card-body{padding:1rem 1.15rem 1.15rem}
.card-body h2{font-size:1.1rem;font-weight:700;margin-bottom:.25rem}
.card-body p{font-size:.82rem;color:var(--silver);line-height:1.45}
.card-footer{display:flex;align-items:center;gap:.5rem;margin-top:.65rem;font-size:.72rem}
.tag{background:rgba(108,99,255,.15);color:#9d97ff;padding:.2rem .65rem;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.diff{color:var(--dim)}

/* ── Footer ── */
footer{position:relative;z-index:1;text-align:center;padding:2rem;color:var(--dim);font-size:.78rem;border-top:1px solid var(--border)}

/* ── Responsive ── */
@media(max-width:768px){
  nav{padding:.6rem 1rem}
  .hero{padding:2.5rem 1rem 1.5rem}
  .hero h1{font-size:1.8rem}
  .container{padding:0 1rem 2rem}
  .games-grid{grid-template-columns:1fr;gap:1rem}
}
@media(min-width:769px) and (max-width:1024px){
  .games-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

  <div class="logo">Thawpaw Games<span>portal</span></div>

    <a href="#" style="color:inherit;text-decoration:none">All Games</a>

const DEFAULT_THUMB = {
  bg: 'linear-gradient(135deg, #1a3a2e 0%, #2d5a4a 100%)',
  svg: `<svg viewBox="0 0 200 200"><text x="100" y="110" text-anchor="middle" font-size="60">🎮</text></svg>`
};

// ── Starfield ──
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+.4,p:Math.random()*6.28,s:Math.random()*.003+.001})}
  function draw(){ctx.clearRect(0,0,c.width,c.height);for(const s of stars){s.p+=s.s;const a=.1+.3*(.5+.5*Math.sin(s.p));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fillStyle=`rgba(160,180,255,${a})`;ctx.fill()}requestAnimationFrame(draw)}
  addEventListener('resize',resize);resize();draw();
})();

// ── Load manifest & build cards ──
(async function(){
  let manifest;
  try{const r=await fetch('manifest.json');manifest=await r.json()}
  catch(e){document.getElementById('grid').innerHTML='<p style="color:#f87171">Could not load manifest.json</p>';return}

  const grid=document.getElementById('grid');
  for(const g of manifest.games){
    const art=THUMB_ART[g.icon]||DEFAULT_THUMB;
    const card=document.createElement('a');
    card.className='game-card';
    card.href=g.file;
    card.innerHTML=`
      <div class="thumb">
        <div class="thumb-bg" style="background:${art.bg}"></div>
        ${art.svg}
        <button class="play-btn" tabindex="-1" aria-label="Play">&#9654;</button>
      </div>
      <div class="card-body">
        <h2>${g.name}</h2>
        <p>${g.description}</p>
        <div class="card-footer">
          <span class="tag">Roguelike</span>
        </div>
      </div>`;
    grid.appendChild(card);
  }
})();
</script>
